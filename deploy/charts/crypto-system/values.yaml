# Default values for crypto-system.

api:
  enabled: true
  replicaCount: 1
  image:
    repository: your-registry/crypto-api
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 4000
    targetPort: 4000
  env:
    PRODUCTION: "true"
    PORT: "4000"
    PREFIX: "/api/v1"
    CLIENT_URL: "http://crypto.local"
  connectionSecret:
    enabled: true
  command: []
  args: []
  podAnnotations: {}
  livenessProbe:
    httpGet:
      path: /api/v1/
      port: http
    initialDelaySeconds: 20
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /api/v1/health/mongo
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  resources: {}

web:
  enabled: true
  replicaCount: 1
  image:
    repository: your-registry/crypto-web
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  env:
    NEXT_PUBLIC_URL: "http://crypto.local"
    NEXT_PUBLIC_API_ENDPOINT: "http://crypto.local/api/v1"
    NEXT_PUBLIC_WEBSOCKET_ENDPOINT: "ws://crypto.local/api/v1"
  command: []
  args: []
  podAnnotations: {}
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  resources: {}

ingestion:
  enabled: false
  replicaCount: 1
  image:
    repository: your-registry/crypto-ingestion
    pullPolicy: IfNotPresent
    tag: latest
  service:
    enabled: false
    type: ClusterIP
    port: 3000
    targetPort: 3000
  env:
    SYMBOL: BTC/USDT
    KAFKA_BROKER: kafka:9092
    KAFKA_TOPIC: market_events
    PORT: "3000"
  resources: {}

streaming:
  enabled: false
  replicaCount: 1
  image:
    repository: your-registry/crypto-streaming
    pullPolicy: IfNotPresent
    tag: latest
  env:
    KAFKA_BROKER: kafka:9092
    KAFKA_TOPIC: market_events
    KAFKA_GROUP_ID: streaming-hot-path
    AUTO_OFFSET_RESET: latest
    REDIS_HOST: redis-master
    REDIS_PORT: "6379"
    REDIS_DB: "0"
  redisPasswordFromSecret: true
  resources: {}

batch:
  enabled: false
  image:
    repository: your-registry/crypto-batch
    pullPolicy: IfNotPresent
    tag: latest
  kafkaToMinio:
    enabled: false
    schedule: "*/10 * * * *"
    command:
      - python
      - processing/batch/pyspark_project/kafka_to_minio.py
    env:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: market_events
      KAFKA_STARTING_OFFSETS: earliest
      KAFKA_ENDING_OFFSETS: latest
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: crypto-lake
      RAW_EVENTS_PATH: s3a://crypto-lake/raw/market_events
      SPARK_LOG_LEVEL: WARN
  volume24hToMongo:
    enabled: false
    schedule: "*/15 * * * *"
    command:
      - python
      - processing/batch/pyspark_project/volume_24h_to_mongodb.py
      - --use-max-event-time
    env:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: crypto-lake
      RAW_EVENTS_PATH: s3a://crypto-lake/raw/market_events
      MONGO_HOST: mongodb
      MONGO_PORT: "27017"
      MONGO_DATABASE: crypto_analytics
      MONGO_AUTH_SOURCE: admin
      MONGO_COLLECTION_VOLUME_24H: volume_24h
      SPARK_LOG_LEVEL: WARN
  resources: {}

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: crypto.local
      paths:
        - path: /
          pathType: Prefix
          serviceName: web
          servicePort: 3000
        - path: /api
          pathType: Prefix
          serviceName: api
          servicePort: 4000
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}

infra:
  redis:
    enabled: false
    host: redis-master
    port: 6379
    auth:
      enabled: true
      createSecret: true
      existingSecret: "crypto-system-redis-auth"
      password: ""
      secretKey: redis-password
  mongodb:
    enabled: false
    host: mongodb
    port: 27017
    database: crypto_analytics
    authSource: admin
    auth:
      enabled: true
      createSecret: true
      existingSecret: "crypto-system-mongodb-auth"
      username: admin
      password: ""
      secretKey: mongodb-root-password
  kafka:
    enabled: false
    host: kafka
    port: 9092
    topic: market_events
    auth:
      createSecret: true
      existingSecret: "crypto-system-kafka-auth"
      clientPasswordsKey: client-passwords
      interBrokerPasswordKey: inter-broker-password
      controllerPasswordKey: controller-password
      interBrokerClientSecretKey: inter-broker-client-secret
      controllerClientSecretKey: controller-client-secret
  minio:
    enabled: false
    host: minio
    port: 9000
    bucket: crypto-lake
    auth:
      createSecret: true
      existingSecret: "crypto-system-minio-auth"
      rootUser: minioadmin
      rootPassword: ""
      userSecretKey: root-user
      passwordSecretKey: root-password
  kafkaUi:
    enabled: false
    image: provectuslabs/kafka-ui:v0.7.2
    service:
      type: ClusterIP
      port: 8080
    ingress:
      enabled: false
      className: ""
      host: kafka-ui.crypto.local

redis:
  fullnameOverride: redis
  architecture: standalone
  auth:
    enabled: true
    existingSecret: crypto-system-redis-auth
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      size: 2Gi
  replica:
    replicaCount: 0

mongodb:
  fullnameOverride: mongodb
  architecture: standalone
  useStatefulSet: true
  auth:
    enabled: true
    rootUser: admin
    rootPassword: "use-existing-secret"
    existingSecret: crypto-system-mongodb-auth
  persistence:
    enabled: true
    size: 8Gi

kafka:
  fullnameOverride: kafka
  clusterId: MkU3OEVBNTcwNTJENDM2Qk
  overrideConfiguration:
    default.replication.factor: 1
    min.insync.replicas: 1
    offsets.topic.replication.factor: 1
    transaction.state.log.replication.factor: 1
    transaction.state.log.min.isr: 1
    share.coordinator.state.topic.replication.factor: 1
    share.coordinator.state.topic.min.isr: 1
  listeners:
    client:
      protocol: PLAINTEXT
    controller:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
  externalAccess:
    enabled: false
  sasl:
    existingSecret: crypto-system-kafka-auth
  kraft:
    enabled: true
  controller:
    replicaCount: 1
    persistence:
      enabled: true
      size: 8Gi
  broker:
    replicaCount: 0
  service:
    type: ClusterIP
    ports:
      client: 9092
  provisioning:
    enabled: false
    topics:
      - name: market_events
        partitions: 1
        replicationFactor: 1

minio:
  fullnameOverride: minio
  mode: standalone
  auth:
    rootUser: minioadmin
    rootPassword: ""
    existingSecret: crypto-system-minio-auth
    rootUserSecretKey: root-user
    rootPasswordSecretKey: root-password
  defaultBuckets: ""
  persistence:
    enabled: true
    size: 8Gi
  service:
    type: ClusterIP
    ports:
      api: 9000
  console:
    service:
      type: ClusterIP
      ports:
        http: 9001
