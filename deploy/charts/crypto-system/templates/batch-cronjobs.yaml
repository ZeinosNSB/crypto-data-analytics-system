        spec:
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "crypto-system.serviceAccountName" . }}
          containers:
            - name: batch-volume24h-mongo
