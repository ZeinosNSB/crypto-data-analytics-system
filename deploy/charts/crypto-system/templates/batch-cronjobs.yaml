{{- if and .Values.batch.enabled .Values.batch.kafkaToMinio.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "crypto-system.componentFullname" (dict "root" . "component" "batch-kafka-to-minio") }}
  labels:
    {{- include "crypto-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: batch-kafka-to-minio
spec:
  schedule: {{ .Values.batch.kafkaToMinio.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "crypto-system.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: batch-kafka-to-minio
        spec:
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "crypto-system.serviceAccountName" . }}
          containers:
            - name: batch-kafka-to-minio
              image: "{{ .Values.batch.image.repository }}:{{ .Values.batch.image.tag }}"
              imagePullPolicy: {{ .Values.batch.image.pullPolicy }}
              command:
                {{- toYaml .Values.batch.kafkaToMinio.command | nindent 16 }}
              env:
                {{- range $key, $value := .Values.batch.kafkaToMinio.env }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.infra.minio.auth.existingSecret }}
                      key: {{ .Values.infra.minio.auth.userSecretKey }}
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.infra.minio.auth.existingSecret }}
                      key: {{ .Values.infra.minio.auth.passwordSecretKey }}
              {{- with .Values.batch.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
---
{{- end }}

{{- if and .Values.batch.enabled .Values.batch.volume24hToMongo.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "crypto-system.componentFullname" (dict "root" . "component" "batch-volume24h-mongo") }}
