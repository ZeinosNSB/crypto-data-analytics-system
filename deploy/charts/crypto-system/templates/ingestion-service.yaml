{{- if and .Values.ingestion.enabled .Values.ingestion.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "crypto-system.componentFullname" (dict "root" . "component" "ingestion") }}
  labels:
    {{- include "crypto-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion
spec:
  type: {{ .Values.ingestion.service.type }}
  ports:
    - port: {{ .Values.ingestion.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "crypto-system.componentSelectorLabels" (dict "root" . "component" "ingestion") | nindent 4 }}
{{- end }}
