{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crypto-system.componentFullname" (dict "root" . "component" "api") }}
  labels:
    {{- include "crypto-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "crypto-system.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "crypto-system.componentSelectorLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "crypto-system.serviceAccountName" . }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.targetPort }}
              protocol: TCP
          {{- with .Values.api.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- range $key, $value := .Values.api.env }}
            {{- if ne (toString $value) "" }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.api.connectionSecret.enabled }}
            {{- if .Values.infra.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.infra.redis.auth.existingSecret }}
                  key: {{ .Values.infra.redis.auth.secretKey }}
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Values.infra.redis.host }}:{{ .Values.infra.redis.port }}"
            {{- else }}
            - name: REDIS_URL
              value: "redis://{{ .Values.infra.redis.host }}:{{ .Values.infra.redis.port }}"
            {{- end }}
            {{- if .Values.infra.mongodb.auth.enabled }}
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.infra.mongodb.auth.existingSecret }}
                  key: {{ .Values.infra.mongodb.auth.secretKey }}
            - name: MONGO_URI
              value: "mongodb://{{ .Values.infra.mongodb.auth.username }}:$(MONGO_PASSWORD)@{{ .Values.infra.mongodb.host }}:{{ .Values.infra.mongodb.port }}/{{ .Values.infra.mongodb.database }}?authSource={{ .Values.infra.mongodb.authSource }}"
            {{- else }}
            - name: MONGO_URI
              value: "mongodb://{{ .Values.infra.mongodb.host }}:{{ .Values.infra.mongodb.port }}/{{ .Values.infra.mongodb.database }}"
            {{- end }}
            {{- end }}
          {{- with .Values.api.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
{{- end }}
