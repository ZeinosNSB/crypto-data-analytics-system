{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "crypto-system.componentFullname" (dict "root" . "component" "web") }}
  labels:
    {{- include "crypto-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "crypto-system.componentSelectorLabels" (dict "root" . "component" "web") | nindent 4 }}
{{- end }}
