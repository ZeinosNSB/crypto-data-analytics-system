{{- if .Values.infra.kafkaUi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "crypto-system.componentFullname" (dict "root" . "component" "kafka-ui") }}
  labels:
    {{- include "crypto-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka-ui
spec:
  type: {{ .Values.infra.kafkaUi.service.type }}
  selector:
    {{- include "crypto-system.componentSelectorLabels" (dict "root" . "component" "kafka-ui") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.infra.kafkaUi.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
