{{- if .Values.infra.minio.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "crypto-system.fullname" . }}-minio-init
  labels:
    {{- include "crypto-system.labels" . | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "crypto-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:latest
          command:
            - /bin/sh
            - -ec
            - |
              mc alias set local http://{{ .Values.infra.minio.host }}:{{ .Values.infra.minio.port }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb -p local/{{ .Values.infra.minio.bucket }} || true
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.infra.minio.auth.existingSecret }}
                  key: {{ .Values.infra.minio.auth.userSecretKey }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.infra.minio.auth.existingSecret }}
                  key: {{ .Values.infra.minio.auth.passwordSecretKey }}
{{- end }}
