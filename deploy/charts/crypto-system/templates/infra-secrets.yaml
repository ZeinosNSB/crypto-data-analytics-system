{{- if and .Values.infra.redis.enabled .Values.infra.redis.auth.enabled .Values.infra.redis.auth.createSecret }}
{{- $redisSecretName := .Values.infra.redis.auth.existingSecret }}
{{- $redisExisting := lookup "v1" "Secret" .Release.Namespace $redisSecretName }}
{{- $redisPassword := .Values.infra.redis.auth.password }}
{{- if and (empty $redisPassword) $redisExisting (hasKey $redisExisting.data .Values.infra.redis.auth.secretKey) }}
{{- $redisPassword = (index $redisExisting.data .Values.infra.redis.auth.secretKey | b64dec) }}
{{- else if empty $redisPassword }}
{{- $redisPassword = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $redisSecretName }}
  labels:
    {{- include "crypto-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.infra.redis.auth.secretKey }}: {{ $redisPassword | quote }}
---
{{- end }}

