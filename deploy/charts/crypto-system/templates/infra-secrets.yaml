{{- if and .Values.infra.kafka.enabled .Values.infra.kafka.auth.createSecret }}
{{- $kafkaSecretName := .Values.infra.kafka.auth.existingSecret }}
{{- $kafkaExisting := lookup "v1" "Secret" .Release.Namespace $kafkaSecretName }}
{{- $clientPasswords := "" }}
{{- $interBrokerPassword := "" }}
{{- $controllerPassword := "" }}
{{- $interBrokerClientSecret := "" }}
{{- $controllerClientSecret := "" }}
{{- if and $kafkaExisting (hasKey $kafkaExisting.data .Values.infra.kafka.auth.clientPasswordsKey) }}
{{- $clientPasswords = (index $kafkaExisting.data .Values.infra.kafka.auth.clientPasswordsKey | b64dec) }}
{{- else }}
{{- $clientPasswords = randAlphaNum 24 }}
{{- end }}
{{- if and $kafkaExisting (hasKey $kafkaExisting.data .Values.infra.kafka.auth.interBrokerPasswordKey) }}
{{- $interBrokerPassword = (index $kafkaExisting.data .Values.infra.kafka.auth.interBrokerPasswordKey | b64dec) }}
{{- else }}
{{- $interBrokerPassword = randAlphaNum 24 }}
{{- end }}
{{- if and $kafkaExisting (hasKey $kafkaExisting.data .Values.infra.kafka.auth.controllerPasswordKey) }}
{{- $controllerPassword = (index $kafkaExisting.data .Values.infra.kafka.auth.controllerPasswordKey | b64dec) }}
{{- else }}
{{- $controllerPassword = randAlphaNum 24 }}
{{- end }}
{{- if and $kafkaExisting (hasKey $kafkaExisting.data .Values.infra.kafka.auth.interBrokerClientSecretKey) }}
{{- $interBrokerClientSecret = (index $kafkaExisting.data .Values.infra.kafka.auth.interBrokerClientSecretKey | b64dec) }}
{{- else }}
{{- $interBrokerClientSecret = randAlphaNum 24 }}
{{- end }}
{{- if and $kafkaExisting (hasKey $kafkaExisting.data .Values.infra.kafka.auth.controllerClientSecretKey) }}
{{- $controllerClientSecret = (index $kafkaExisting.data .Values.infra.kafka.auth.controllerClientSecretKey | b64dec) }}
{{- else }}
{{- $controllerClientSecret = randAlphaNum 24 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $kafkaSecretName }}
  labels:
    {{- include "crypto-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.infra.kafka.auth.clientPasswordsKey }}: {{ $clientPasswords | quote }}
  {{ .Values.infra.kafka.auth.interBrokerPasswordKey }}: {{ $interBrokerPassword | quote }}
  {{ .Values.infra.kafka.auth.controllerPasswordKey }}: {{ $controllerPassword | quote }}
  {{ .Values.infra.kafka.auth.interBrokerClientSecretKey }}: {{ $interBrokerClientSecret | quote }}
  {{ .Values.infra.kafka.auth.controllerClientSecretKey }}: {{ $controllerClientSecret | quote }}
---
{{- end }}

{{- if and .Values.infra.minio.enabled .Values.infra.minio.auth.createSecret }}
{{- $minioSecretName := .Values.infra.minio.auth.existingSecret }}
{{- $minioExisting := lookup "v1" "Secret" .Release.Namespace $minioSecretName }}
{{- $minioRootUser := .Values.infra.minio.auth.rootUser }}
{{- $minioRootPassword := .Values.infra.minio.auth.rootPassword }}
{{- if and (empty $minioRootPassword) $minioExisting (hasKey $minioExisting.data .Values.infra.minio.auth.passwordSecretKey) }}
{{- $minioRootPassword = (index $minioExisting.data .Values.infra.minio.auth.passwordSecretKey | b64dec) }}
{{- else if empty $minioRootPassword }}
{{- $minioRootPassword = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $minioSecretName }}
  labels:
    {{- include "crypto-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.infra.minio.auth.userSecretKey }}: {{ $minioRootUser | quote }}
  {{ .Values.infra.minio.auth.passwordSecretKey }}: {{ $minioRootPassword | quote }}
---
{{- end }}
