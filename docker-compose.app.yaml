services:
  api:
    image: oven/bun:1.2.2-alpine
    working_dir: /workspace
    command: >
      sh -lc "while [ ! -f /workspace/node_modules/.modules.yaml ]; do
      echo 'Waiting for pnpm install to finish...'; sleep 2; done &&
      bun --watch run apps/api/src/index.ts"
    environment:
      PRODUCTION: "false"
      PORT: 4000
      PREFIX: /api/v1
      CLIENT_URL: http://web:3000
    ports:
      - "4000:4000"
    volumes:
      - ./:/workspace
      - workspace_node_modules:/workspace/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - crypto_net

  web:
    image: node:20-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install --frozen-lockfile &&
      rm -rf apps/web/.next &&
      pnpm exec nx run web:dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_URL: http://localhost:3000
      NEXT_PUBLIC_API_ENDPOINT: http://localhost:4000/api/v1
      NEXT_PUBLIC_WEBSOCKET_ENDPOINT: ws://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
      - workspace_node_modules:/workspace/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      api:
        condition: service_started
    networks:
      - crypto_net

  batch:
    build:
      context: .
      dockerfile: processing/batch/Dockerfile
    working_dir: /workspace
    command: python processing/batch/pyspark_project/read_json.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: market_events
      KAFKA_STARTING_OFFSETS: earliest
      KAFKA_ENDING_OFFSETS: latest
    volumes:
      - ./:/workspace
    networks:
      - crypto_net
    restart: "no"

  streaming:
    build:
      context: .
      dockerfile: processing/streaming/Dockerfile
    working_dir: /workspace
    command: python processing/streaming/src/streaming_app.py
    volumes:
      - ./:/workspace
    ports:
      - "9999:9999"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crypto_net

  ingestion:
    build:
      context: ./ingestion/collector
      dockerfile: DockerFile
    profiles:
      - ingestion
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: market_events
      SYMBOL: BTC/USDT
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - crypto_net
    restart: unless-stopped

volumes:
  pnpm_store:
  workspace_node_modules:

networks:
  crypto_net:
