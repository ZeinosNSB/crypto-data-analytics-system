services:
  api:
    image: oven/bun:1.2.2-alpine
    working_dir: /workspace
    command: >
      sh -lc "while [ ! -f /workspace/node_modules/.modules.yaml ]; do
      echo 'Waiting for pnpm install to finish...'; sleep 2; done &&
      bun --watch run apps/api/src/index.ts"
    environment:
      PRODUCTION: "false"
      PORT: 4000
      PREFIX: /api/v1
      CLIENT_URL: http://web:3000
    ports:
      - "4000:4000"
    volumes:
      - ./:/workspace
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - crypto_net

  web:
    image: node:20-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install --frozen-lockfile &&
      rm -rf apps/web/.next &&
      pnpm exec nx run web:dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_URL: http://localhost:3000
      NEXT_PUBLIC_API_ENDPOINT: http://localhost:4000/api/v1
      NEXT_PUBLIC_WEBSOCKET_ENDPOINT: ws://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      api:
        condition: service_started
    networks:
      - crypto_net

  batch:
    image: python:3.10-slim
    working_dir: /workspace
    command: >
      sh -lc "apt-get update &&
      apt-get install -y --no-install-recommends openjdk-21-jre-headless procps &&
      rm -rf /var/lib/apt/lists/* &&
      pip install --no-cache-dir pyspark==3.5.1 &&
      python processing/batch/pyspark_project/read_json.py"
    volumes:
      - ./:/workspace
    networks:
      - crypto_net
    restart: "no"

  streaming:
    image: python:3.10-slim
    working_dir: /workspace
    command: >
      sh -lc "apt-get update &&
      apt-get install -y --no-install-recommends openjdk-21-jre-headless procps &&
      rm -rf /var/lib/apt/lists/* &&
      pip install --no-cache-dir -r processing/streaming/requirements.txt &&
      python processing/streaming/src/streaming_app.py"
    volumes:
      - ./:/workspace
    ports:
      - "9999:9999"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crypto_net

volumes:
  pnpm_store:

networks:
  crypto_net:
